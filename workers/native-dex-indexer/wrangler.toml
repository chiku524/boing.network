# Standalone indexer: GET /stats JSON + cron refresh into KV (durable reserve history).
# 1. Create KV: npx wrangler kv namespace create NATIVE_DEX_INDEXER_KV
# 2. Paste id below (and preview_id for `wrangler dev`).
name = "boing-native-dex-indexer"
main = "src/index.ts"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]

# Created via: wrangler kv namespace create "boing-native-dex-indexer-state"
# Preview: wrangler kv namespace create "boing-native-dex-indexer-preview" --preview
[[kv_namespaces]]
binding = "NATIVE_DEX_INDEXER_KV"
id = "28b6a1cbc43b4cceaaa69d7e305ad93c"
preview_id = "f6c686292e544a868a3bbfa8c37cede6"

# D1: cursor-paginated GET /v1/directory/pools (populated by cron + optional POST /v1/directory/sync).
[[d1_databases]]
binding = "DIRECTORY_DB"
database_name = "boing-native-dex-directory"
database_id = "68eb37e6-f71c-47fa-9475-19d7a56b0db0"
migrations_dir = "migrations"

# Optional: `npx wrangler r2 bucket create boing-native-dex-indexer-archive` then deploy — tiny JSON manifests per sync.
[[r2_buckets]]
binding = "INDEXER_ARCHIVE_R2"
bucket_name = "boing-native-dex-indexer-archive"

[triggers]
crons = ["*/15 * * * *"]

# Plain-text vars below ship with `wrangler deploy` ([vars]).
# You can also set or override non-secret vars in the dashboard; secrets must never be committed here — use dashboard or `wrangler secret put`.
[vars]
BOING_TESTNET_RPC_URL = "https://testnet-rpc.boing.network"
NATIVE_DEX_INDEXER_LOG_SCAN_BLOCKS = "8000"
NATIVE_DEX_INDEXER_RECEIPT_ARCHIVE_BLOCKS = "500"
# Optional: set when you deploy an LP position NFT (ERC-721) for model B indexing + `/v1/lp/nft/positions` default contract.
# NATIVE_DEX_INDEXER_LP_NFT_CONTRACT_HEX = "0x…"
# Optional: factory registration merge from this height (decimal).
# NATIVE_DEX_INDEXER_REGISTER_FROM_BLOCK = "0"
# Optional static USD map / extra token rows for the indexer JSON (escape quotes for TOML).
# NATIVE_DEX_INDEXER_TOKEN_USD_JSON = "{\"0x…\":\"1\"}"
# NATIVE_DEX_INDEXER_TOKEN_DIRECTORY_JSON = "[{\"id\":\"0x…\",\"symbol\":\"FOO\"}]"
# Canonical public testnet (6913) native DEX — mirrors boing-sdk `canonicalTestnet*.ts` at time of edit.
