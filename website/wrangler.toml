# Used by: wrangler pages deploy dist (and Pages Git deploy with Functions + D1)
# Add D1 so /api/* Functions can access the database.
name = "boing-network"
# Use a recent date so compatibility_flags (e.g. nodejs_compat) apply to the Functions worker.
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "boing-network-db"
database_id = "8cafc32c-5d92-42f3-8c4e-5277b20006c5"
