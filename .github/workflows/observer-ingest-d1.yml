name: observer-ingest-d1

on:
  push:
    branches: [main]
    paths:
      - "examples/observer-d1-worker/**"
      - "examples/observer-ingest-reference/**"
      - "boing-sdk/**"
      - ".github/workflows/observer-ingest-d1.yml"
  pull_request:
    paths:
      - "examples/observer-d1-worker/**"
      - "examples/observer-ingest-reference/**"
      - "boing-sdk/**"
      - ".github/workflows/observer-ingest-d1.yml"

jobs:
  d1-worker-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/observer-d1-worker/package-lock.json

      - name: Build boing-sdk
        working-directory: boing-sdk
        run: npm ci && npm run build

      - name: Install worker dependencies
        working-directory: examples/observer-d1-worker
        run: npm ci

      - name: D1 migrations apply (local smoke)
        working-directory: examples/observer-d1-worker
        run: npx wrangler d1 migrations apply boing-observer-indexer --local

      - name: Typecheck worker
        working-directory: examples/observer-d1-worker
        run: npx tsc -p tsconfig.json

      - name: Unit tests (worker)
        working-directory: examples/observer-d1-worker
        run: npm test

      - name: Wrangler bundle (dry-run)
        working-directory: examples/observer-d1-worker
        run: npx wrangler deploy --dry-run

  ingest-reference-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: examples/observer-ingest-reference/package-lock.json

      - name: Build boing-sdk
        working-directory: boing-sdk
        run: npm ci && npm run build

      - name: Install reference package
        working-directory: examples/observer-ingest-reference
        run: npm ci

      - name: Syntax-check ingest scripts
        working-directory: examples/observer-ingest-reference
        run: |
          node --check scripts/ingest-state-tick.mjs
          node --check scripts/ingest-sqlite-tick.mjs
          node --check scripts/lib/ingest-fetch-tick.mjs
          node --check scripts/lib/sqlite-persist.mjs
