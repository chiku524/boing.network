# Build and publish Boing Network Hub (Tauri 2 desktop app) for Windows, macOS, and Linux.
# Trigger: push tag desktop-hub/v* (e.g. desktop-hub/v0.1.2) or Run workflow from Actions.
# Does NOT run on push to main or on tags like v* or testnet* (those are for release.yml).
name: Desktop Hub — Release

on:
  push:
    tags:
      - 'desktop-hub/v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          # Root has a minimal package-lock.json so setup-node finds it; desktop-hub deps are installed in next step

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # Workspace root contains desktop-hub/src-tauri; target is at repo root
          workspaces: '.'

      - name: Install frontend dependencies
        working-directory: desktop-hub
        run: npm ci

      - name: Import Windows code signing certificate
        if: matrix.platform == 'windows-latest'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            Write-Host 'Windows signing skipped: WINDOWS_CERTIFICATE or WINDOWS_CERTIFICATE_PASSWORD not set'
            exit 0
          }
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt -Force
          Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)
          Remove-Item -Recurse -Force certificate

      - name: Set Windows certificate thumbprint in config
        if: matrix.platform == 'windows-latest'
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_THUMBPRINT) {
            Write-Host 'Windows signing thumbprint skipped: WINDOWS_CERTIFICATE_THUMBPRINT not set'
            exit 0
          }
          node -e "
          const fs = require('fs');
          const path = 'desktop-hub/src-tauri/tauri.conf.json';
          const c = JSON.parse(fs.readFileSync(path, 'utf8'));
          c.bundle.windows.certificateThumbprint = process.env.WINDOWS_CERTIFICATE_THUMBPRINT;
          fs.writeFileSync(path, JSON.stringify(c, null, 2));
          "
        working-directory: .

      # Minisign key: write to file (preserves newlines). Cannot use `secrets` in step `if:` (invalid workflow).
      # Optional password only appended to GITHUB_ENV when non-empty.
      - name: Configure Tauri updater signing
        shell: bash
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          _PW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${KEY}" ]; then
            echo "::error::Set repository secret TAURI_SIGNING_PRIVATE_KEY (full minisign private key, both lines)."
            exit 1
          fi
          mkdir -p desktop-hub/.tauri
          python -c "import os, pathlib; pathlib.Path('desktop-hub/.tauri/ci-updater.key').write_text(os.environ['KEY'], encoding='utf-8')"
          # Tauri reads TAURI_SIGNING_PRIVATE_KEY (path or inline key), not *_PATH.
          echo "TAURI_SIGNING_PRIVATE_KEY=${{ github.workspace }}/desktop-hub/.tauri/ci-updater.key" >> "$GITHUB_ENV"
          if [ -n "${_PW}" ]; then
            {
              echo 'TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<__TAURI_PW_EOF__'
              printf '%s' "${_PW}"
              echo ''
              echo '__TAURI_PW_EOF__'
            } >> "$GITHUB_ENV"
          fi

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-hub
          tagName: desktop-hub/v__VERSION__
          releaseName: 'Boing Network Hub v__VERSION__'
          releaseBody: 'All-in-one desktop app: Observer, Wallet, Finance, Testnet. Direct downloads at https://boing.network/downloads'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
