name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: cd website && npm ci

      - name: Build
        run: cd website && npm run build
        env:
          # Optional: set PUBLIC_TESTNET_RPC_URL and PUBLIC_BOOTNODES in repo Settings → Secrets and variables → Actions so the faucet and testnet pages show the live endpoints.
          PUBLIC_TESTNET_RPC_URL: ${{ vars.PUBLIC_TESTNET_RPC_URL }}
          PUBLIC_BOOTNODES: ${{ vars.PUBLIC_BOOTNODES }}

      - name: Deploy to Cloudflare Pages
        run: |
          cd website
          for i in 1 2 3; do
            npx wrangler pages deploy dist --project-name=boing-network && exit 0
            echo "Deploy attempt $i failed (e.g. 504). Retrying in 30s..."
            sleep 30
          done
          echo "Deploy failed after 3 attempts."
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 10374f367672f4d19db430601db0926b
